services:
  - type: web
    name: glencore-incident-management
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://localhost:5173,https://*.lovable.app
      - key: DATABASE_URL
        value: sqlite:///./incidents.db
      - key: UPLOAD_DIR
        value: uploads
      - key: ENVIRONMENT
        value: production
